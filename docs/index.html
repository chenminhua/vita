<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vita Workout Heatmap</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Workout Heatmap</h1>
        <div class="year-switcher">
          <label for="yearSelect">Year</label>
          <select id="yearSelect"></select>
        </div>
      </header>

      <section>
        <div id="heatmap" class="heatmap"></div>
        <div class="legend">
          <span>Less</span>
          <div class="swatch lv0"></div>
          <div class="swatch lv1"></div>
          <div class="swatch lv2"></div>
          <div class="swatch lv3"></div>
          <div class="swatch lv4"></div>
          <span>More</span>
        </div>
      </section>

      <section class="summary">
        <h2 id="summaryTitle"></h2>
        <pre id="summaryContent"></pre>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
